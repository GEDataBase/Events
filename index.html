<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#00544F" />
    <title>Greener Edge — Carbon Calculator</title>

    <!-- Inter as a clean modern substitute for Aptos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      html, body {
        margin: 0; padding: 0;
        background-color: #00544F;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #ffffff;
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none; margin: 0;
      }
      input[type="number"] { -moz-appearance: textfield; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn { animation: fadeUp 0.35s ease backwards; }

      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner { animation: spin 0.8s linear infinite; }

      @keyframes pop {
        0%   { transform: scale(0.9); opacity: 0; }
        60%  { transform: scale(1.05); }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      /**
       * ============================================================================
       *  GREENER EDGE — CARBON CALCULATOR
       * ----------------------------------------------------------------------------
       *  Branded version with vehicle drill-down, reusable size step, varied
       *  equivalents, and split follow-up flow.
       * ============================================================================
       */

      // ---- CONFIGURATION ---------------------------------------------------
      const EVENT_LOCATION = "EX39 5AP"; // TODO: confirm venue with Shivi
      const GOOGLE_API_KEY = "AIzaSyAy1opt8OkVm1Nsc6DCAzWQxmxOYB1Jmy4";
      const MAPS_KEY = "AIzaSyAy1opt8OkVm1Nsc6DCAzWQxmxOYB1Jmy4"; // replace with the unrestricted browser-maps key
      const PROXY_URL =
        "https://script.google.com/macros/s/AKfycbxgALUDwnmJSe8lbrt_xJU0vqHLV7KIEeVodc4BdKrVCm5TRJXLkXLR4yD-VAx0jadX/exec";
      const DEFAULT_UNIT = "miles";

      // ---- BRAND -----------------------------------------------------------
      const BRAND = {
        dark: "#00544F",   // primary deep teal-green
        lime: "#85BE00",   // accent lime
        cream: "#f5f1e8",  // warm card surface for contrast against dark bg
        white: "#ffffff",
        // Derived shades for hierarchy
        darkAlt: "#003E3A",
        limeDark: "#6FA000",
        muted: "#8FB4B0",
        cardText: "#1e2a1e",
        cardSubtle: "#5a6650",
        cardLabel: "#7a8a82",
      };

      // ---- EMISSIONS FACTORS ----------------------------------------------
      /**
       * UK Government (DEFRA / DESNZ) 2024 Greenhouse Gas Conversion Factors.
       * Published 8 July 2024, updated 30 Oct 2024.
       * https://www.gov.uk/government/publications/greenhouse-gas-reporting-conversion-factors-2024
       *
       * Vehicle figures are kg CO2e per *vehicle*-km (divide by occupancy for
       * per-person). Public transport figures are kg CO2e per *passenger*-km
       * (already per-person).
       *
       * DEFRA splits cars by size (small/medium/large) AND fuel type. Combined
       * values below are the published DEFRA averages for each combination.
       * Small/Medium/Large bands roughly: <1.4L / 1.4–2.0L / >2.0L for petrol;
       * <1.7L / 1.7–2.0L / >2.0L for diesel.
       *
       * Electric: figure includes UK grid electricity emissions (well-to-tank
       * + tank-to-wheel for grid generation).
       *
       * Cross-check before going live against the official "Condensed set"
       * spreadsheet in case of minor updates.
       */
      const CAR_FACTORS = {
        // [fuel][size] → kg CO2e per vehicle-km
        petrol:   { small: 0.142, medium: 0.180, large: 0.272 },
        diesel:   { small: 0.140, medium: 0.166, large: 0.211 },
        electric: { small: 0.047, medium: 0.062, large: 0.072 },
        hybrid:   { small: 0.106, medium: 0.110, large: 0.151 },
      };

      const MOTORBIKE_FACTORS = {
        // per vehicle-km
        small: 0.083, medium: 0.101, large: 0.132,
      };

      const PUBLIC_TRANSPORT_FACTORS = {
        // per passenger-km
        bus:   0.10,   // local bus (non-London)
        train: 0.035,  // national rail
        coach: 0.027,  // coach (long-distance)
      };

      const COMPARISON_FACTORS = {
        rail: 0.035,
        bus: 0.10,
      };

      const MILES_TO_KM = 1.60934;

      // ---- RELATABLE EQUIVALENTS ------------------------------------------
      /**
       * Mix of household-energy equivalents. Numbers are based on:
       *  - Kettle boil (full kettle, ~3kW for 3min): ~0.045 kg CO2e (UK grid)
       *  - TV (modern 50" LED, ~0.05 kW, 1 hour): ~0.011 kg CO2e
       *  - Average UK home, 1 hour of total energy use: ~0.85 kg CO2e
       *  - LED bulb 8W for 1 hour: ~0.0018 kg CO2e
       *
       * We auto-pick the equivalent that lands in a 1-100 range so it feels
       * memorable. Small numbers get the kettle, mid-range gets TV, big gets home.
       */
      const EQUIVALENTS = [
        {
          unit: "kettle boils",
          emoji: "🫖",
          format: (n) => `boiling the kettle ${n} ${n === 1 ? "time" : "times"}`,
          perKg: 1 / 0.045,
          idealMin: 1, idealMax: 80,
        },
        {
          unit: "TV hours",
          emoji: "📺",
          format: (n) => `running a TV for ${n} ${n === 1 ? "hour" : "hours"}`,
          perKg: 1 / 0.011,
          idealMin: 1, idealMax: 200,
        },
        {
          unit: "home hours",
          emoji: "🏠",
          format: (n) => `powering an average UK home for ${n} ${n === 1 ? "hour" : "hours"}`,
          perKg: 1 / 0.85,
          idealMin: 1, idealMax: 100,
        },
      ];

      function pickEquivalent(kg) {
        // Try each in order; pick the first that lands in its ideal range.
        const scored = EQUIVALENTS.map((e) => ({
          ...e,
          count: Math.max(1, Math.round(kg * e.perKg)),
        }));
        const inRange = scored.find(
          (e) => e.count >= e.idealMin && e.count <= e.idealMax,
        );
        if (inRange) return inRange;
        // Fallback: whichever gives the smallest "memorable" number
        return scored.reduce((best, cur) =>
          Math.abs(cur.count - 30) < Math.abs(best.count - 30) ? cur : best,
        );
      }

      // ---- TRAVEL MODES ---------------------------------------------------
      // Each mode declares which drill-down steps it needs.
      // Steps: "fuel" (car only), "size" (car + motorbike + ?), "ptType" (bus/train/coach)
      const TRAVEL_MODES = [
        {
          id: "car",
          label: "Car",
          emoji: "🚗",
          sublabel: "Petrol, diesel, EV, hybrid",
          steps: ["fuel", "size"],
          needsOccupancy: true,
        },
        {
          id: "motorbike",
          label: "Motorbike",
          emoji: "🏍️",
          sublabel: "Or scooter",
          steps: ["size"],
          needsOccupancy: true,
        },
        {
          id: "publicTransport",
          label: "Public transport",
          emoji: "🚆",
          sublabel: "Bus, train, coach",
          steps: ["ptType"],
          needsOccupancy: false,
        },
        {
          id: "cycleWalk",
          label: "Cycle or walk",
          emoji: "🚴",
          sublabel: "Zero emissions, hero",
          steps: [],
          needsOccupancy: false,
        },
      ];

      const FUEL_OPTIONS = [
        { id: "petrol",   label: "Petrol",   emoji: "⛽", sublabel: "Unleaded" },
        { id: "diesel",   label: "Diesel",   emoji: "🛢️", sublabel: "" },
        { id: "electric", label: "Electric", emoji: "⚡", sublabel: "Battery EV" },
        { id: "hybrid",   label: "Hybrid",   emoji: "🔋", sublabel: "Petrol + electric" },
      ];

      const CAR_SIZE_OPTIONS = [
        { id: "small",  label: "Small",  emoji: "🚙", sublabel: "Hatchback, city car" },
        { id: "medium", label: "Medium", emoji: "🚗", sublabel: "Saloon, estate" },
        { id: "large",  label: "Large",  emoji: "🚐", sublabel: "SUV, 4x4, van" },
      ];

      const BIKE_SIZE_OPTIONS = [
        { id: "small",  label: "Small",  emoji: "🛵", sublabel: "Up to 125cc" },
        { id: "medium", label: "Medium", emoji: "🏍️", sublabel: "125–500cc" },
        { id: "large",  label: "Large",  emoji: "🏁", sublabel: "Over 500cc" },
      ];

      const PT_TYPE_OPTIONS = [
        { id: "train", label: "Train",   emoji: "🚆", sublabel: "National rail" },
        { id: "bus",   label: "Bus",     emoji: "🚌", sublabel: "Local bus" },
        { id: "coach", label: "Coach",   emoji: "🚍", sublabel: "Long-distance" },
      ];

      // ---- UK POSTCODE VALIDATION -----------------------------------------
      const UK_POSTCODE_REGEX =
        /^([Gg][Ii][Rr] 0[Aa]{2})|((([A-Za-z][0-9]{1,2})|(([A-Za-z][A-Ha-hJ-Yj-y][0-9]{1,2})|(([A-Za-z][0-9][A-Za-z])|([A-Za-z][A-Ha-hJ-Yj-y][0-9]?[A-Za-z])))) ?[0-9][A-Za-z]{2})$/;
      const isValidUKPostcode = (pc) =>
        !!pc && UK_POSTCODE_REGEX.test(pc.trim());

      // ---- DISTANCE LOOKUP VIA PROXY --------------------------------------
      async function fetchDrivingDistance(originPostcode, destination) {
        const url =
          PROXY_URL +
          "?origin=" + encodeURIComponent(originPostcode + ", UK") +
          "&destination=" + encodeURIComponent(destination);
        const res = await fetch(url);
        if (!res.ok) throw new Error("Couldn't reach the distance service. Try again?");
        const data = await res.json();
        if (data.status !== "OK") {
          throw new Error(data.error_message || `Google API error: ${data.status}`);
        }
        const el = data.rows?.[0]?.elements?.[0];
        if (!el || el.status !== "OK") {
          throw new Error("Couldn't find a driving route between those two places. Double-check the postcode?");
        }
        return { meters: el.distance.value, text: el.distance.text };
      }

      // ---- EMISSIONS FACTOR RESOLVER --------------------------------------
      function resolveEmissionsFactor({ mode, fuel, size, ptType }) {
        if (mode === "car" && fuel && size) return CAR_FACTORS[fuel][size];
        if (mode === "motorbike" && size) return MOTORBIKE_FACTORS[size];
        if (mode === "publicTransport" && ptType) return PUBLIC_TRANSPORT_FACTORS[ptType];
        if (mode === "cycleWalk") return 0;
        return 0;
      }

      function modeDescription({ mode, fuel, size, ptType }) {
        if (mode === "cycleWalk") return "by cycle or on foot";
        if (mode === "publicTransport") return "by " + (ptType || "public transport");
        if (mode === "car") {
          const fuelLabel = FUEL_OPTIONS.find((f) => f.id === fuel)?.label?.toLowerCase() || "";
          return `by ${size || ""} ${fuelLabel} car`.replace(/\s+/g, " ").trim();
        }
        if (mode === "motorbike") return `by ${size || ""} motorbike`.trim();
        return "";
      }

      // ============================================================================
      //  MAIN
      // ============================================================================
      function CarbonCalculator() {
        const [screen, setScreen] = React.useState("mode");
        // mode | fuel | size | ptType | distance | occupancy | results | followup | details | thanks

        const [mode, setMode] = React.useState(null);
        const [fuel, setFuel] = React.useState(null);
        const [size, setSize] = React.useState(null);
        const [ptType, setPtType] = React.useState(null);

        const [distanceKm, setDistanceKm] = React.useState(null);
        const [distanceLabel, setDistanceLabel] = React.useState("");
        const [originLabel, setOriginLabel] = React.useState("");
        const [occupancy, setOccupancy] = React.useState(1);

        const [submissionStatus, setSubmissionStatus] = React.useState("idle"); // idle | anonymousSaved | saving | done | error
        const [submissionError, setSubmissionError] = React.useState("");

        const modeConfig = TRAVEL_MODES.find((m) => m.id === mode);

        // ---- Calculation ----
        const factor = resolveEmissionsFactor({ mode, fuel, size, ptType });
        const totalKg = (distanceKm || 0) * factor;
        const perPersonKg = modeConfig?.needsOccupancy ? totalKg / occupancy : totalKg;

        // ---- Navigation helpers ----
        const reset = () => {
          setScreen("mode");
          setMode(null); setFuel(null); setSize(null); setPtType(null);
          setDistanceKm(null); setDistanceLabel(""); setOriginLabel("");
          setOccupancy(1);
          setSubmissionStatus("idle");
          setSubmissionError("");
        };

        const advanceFromMode = (m) => {
          setMode(m.id);
          if (m.steps[0]) setScreen(m.steps[0]);
          else setScreen("distance");
        };

        const advanceFromFuel = (f) => {
          setFuel(f);
          // After fuel, next step is "size" for car
          setScreen("size");
        };

        const advanceFromSize = (s) => {
          setSize(s);
          setScreen("distance");
        };

        const advanceFromPtType = (t) => {
          setPtType(t);
          setScreen("distance");
        };

        const handleDistanceSubmit = ({ km, label, origin }) => {
          setDistanceKm(km);
          setDistanceLabel(label);
          setOriginLabel(origin || "");
          setScreen(modeConfig?.needsOccupancy ? "occupancy" : "results");
        };

        // ---- Anonymous save: when user lands on the results screen, push a row ----
        // so we still capture the journey even if they decline the follow-up.
        // We only save once per session, and we never include PII at this stage.
        React.useEffect(() => {
          if (screen !== "results") return;
          if (submissionStatus !== "idle") return;
          if (!distanceKm || distanceKm <= 0) return;
          // fire-and-forget
          (async () => {
            try {
              await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                  action: "save",
                  name: "",
                  company: "",
                  email: "",
                  subscribed: false,
                  mode: modeDescription({ mode, fuel, size, ptType }),
                  distanceKm,
                  origin: originLabel,
                  occupancy,
                  totalKg,
                  perPersonKg,
                }),
              });
              setSubmissionStatus("anonymousSaved");
            } catch {
              // Silent — anonymous save failure shouldn't block the user.
              setSubmissionStatus("anonymousSaved");
            }
          })();
        }, [screen]);

        // ---- Progress indicator: dynamic based on the path ----
        const stepsForCurrentMode = ["mode"]
          .concat(modeConfig?.steps || [])
          .concat(["distance"])
          .concat(modeConfig?.needsOccupancy ? ["occupancy"] : [])
          .concat(["results"]);
        const totalSteps = stepsForCurrentMode.length;
        const currentStep = Math.max(1, stepsForCurrentMode.indexOf(screen) + 1);

        // ---- Header breadcrumb so users see context ----
        const breadcrumb = [
          modeConfig?.label,
          fuel && FUEL_OPTIONS.find((f) => f.id === fuel)?.label,
          size && (mode === "motorbike"
            ? BIKE_SIZE_OPTIONS.find((s) => s.id === size)?.label
            : CAR_SIZE_OPTIONS.find((s) => s.id === size)?.label),
          ptType && PT_TYPE_OPTIONS.find((p) => p.id === ptType)?.label,
        ].filter(Boolean).join(" · ");

        return (
          <div style={{
            minHeight: "100vh",
            backgroundColor: BRAND.dark,
            color: BRAND.white,
            position: "relative",
            overflow: "hidden",
          }}>
            {/* Subtle decorative leaf in background */}
            <div style={{
              position: "absolute",
              top: -120, right: -120,
              width: 400, height: 400,
              backgroundImage:
                "radial-gradient(circle, rgba(133,190,0,0.08) 0%, transparent 70%)",
              pointerEvents: "none",
            }}/>

            <div className="relative mx-auto flex min-h-screen max-w-md flex-col px-5 pb-10 pt-5">
              {/* ---- HEADER ---- */}
              <Header
                currentStep={currentStep}
                totalSteps={totalSteps}
                showProgress={!["thanks"].includes(screen)}
              />

              {/* Optional breadcrumb */}
              {breadcrumb && !["thanks","followup","details"].includes(screen) && (
                <div
                  className="mb-3 text-xs"
                  style={{ color: BRAND.lime, letterSpacing: "0.05em" }}
                >
                  {breadcrumb}
                </div>
              )}

              {/* ---- SCREENS ---- */}
              <main className="flex-1">
                {screen === "mode" && (
                  <ScreenPicker
                    eyebrow="Step 1"
                    title="How did you get here?"
                    subtitle="Tap your mode of transport to begin."
                    options={TRAVEL_MODES}
                    onSelect={advanceFromMode}
                  />
                )}

                {screen === "fuel" && (
                  <ScreenPicker
                    eyebrow="Step 2"
                    title="What fuel?"
                    subtitle="Pick what powers your car."
                    options={FUEL_OPTIONS}
                    onSelect={advanceFromFuel}
                    onBack={() => setScreen("mode")}
                  />
                )}

                {screen === "size" && (
                  <ScreenPicker
                    eyebrow={mode === "car" ? "Step 3" : "Step 2"}
                    title={mode === "motorbike" ? "What size bike?" : "What size?"}
                    subtitle={mode === "motorbike"
                      ? "Engine size, not body size."
                      : "Roughly. Don't overthink it."}
                    options={mode === "motorbike" ? BIKE_SIZE_OPTIONS : CAR_SIZE_OPTIONS}
                    onSelect={advanceFromSize}
                    onBack={() => setScreen(mode === "car" ? "fuel" : "mode")}
                  />
                )}

                {screen === "ptType" && (
                  <ScreenPicker
                    eyebrow="Step 2"
                    title="Bus, train, or coach?"
                    subtitle="Pick what you took."
                    options={PT_TYPE_OPTIONS}
                    onSelect={advanceFromPtType}
                    onBack={() => setScreen("mode")}
                  />
                )}

                {screen === "distance" && (
                  <ScreenDistance
                    onBack={() => {
                      if (modeConfig?.steps?.length) {
                        setScreen(modeConfig.steps[modeConfig.steps.length - 1]);
                      } else {
                        setScreen("mode");
                      }
                    }}
                    onSubmit={handleDistanceSubmit}
                  />
                )}

                {screen === "occupancy" && (
                  <ScreenOccupancy
                    occupancy={occupancy}
                    setOccupancy={setOccupancy}
                    onBack={() => setScreen("distance")}
                    onSubmit={() => setScreen("results")}
                  />
                )}

                {screen === "results" && (
                  <ScreenResults
                    mode={mode}
                    fuel={fuel}
                    size={size}
                    ptType={ptType}
                    distanceKm={distanceKm}
                    totalKg={totalKg}
                    perPersonKg={perPersonKg}
                    occupancy={occupancy}
                    needsOccupancy={modeConfig?.needsOccupancy}
                    distanceLabel={distanceLabel}
                    originLabel={originLabel}
                    onContinue={() => setScreen("followup")}
                  />
                )}

                {screen === "followup" && (
                  <ScreenFollowup
                    onYes={() => setScreen("details")}
                    onNo={() => setScreen("thanks")}
                  />
                )}

                {screen === "details" && (
                  <ScreenDetails
                    mode={mode}
                    fuel={fuel}
                    size={size}
                    ptType={ptType}
                    distanceKm={distanceKm}
                    origin={originLabel}
                    occupancy={occupancy}
                    totalKg={totalKg}
                    perPersonKg={perPersonKg}
                    onDone={() => setScreen("thanks")}
                    onBack={() => setScreen("followup")}
                  />
                )}

                {screen === "thanks" && (
                  <ScreenThanks onRestart={reset} />
                )}
              </main>
            </div>
          </div>
        );
      }

      // ============================================================================
      //  HEADER (logo + progress)
      // ============================================================================
      function Header({ currentStep, totalSteps, showProgress }) {
        return (
          <header className="mb-6 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Leaf size={28} />
              <div>
                <div style={{
                  fontSize: 16, fontWeight: 700, color: BRAND.white,
                  letterSpacing: "-0.01em", lineHeight: 1,
                }}>
                  Greener Edge
                </div>
                <div style={{
                  fontSize: 9, fontWeight: 700, color: BRAND.lime,
                  letterSpacing: "0.15em", marginTop: 2,
                }}>
                  CARBON CALCULATOR
                </div>
              </div>
            </div>

            {showProgress && (
              <div className="flex items-center gap-2 text-xs"
                   style={{ color: BRAND.muted }}>
                <span style={{ fontWeight: 500 }}>
                  {currentStep}/{totalSteps}
                </span>
                <div className="flex gap-1">
                  {Array.from({ length: totalSteps }).map((_, i) => (
                    <span key={i} style={{
                      height: 4, width: 14, borderRadius: 9999,
                      backgroundColor: i < currentStep ? BRAND.lime : "rgba(255,255,255,0.2)",
                      transition: "background-color 0.3s",
                    }}/>
                  ))}
                </div>
              </div>
            )}
          </header>
        );
      }

      // Small inline-SVG version of the leaf logo so we don't need an external asset.
      function Leaf({ size = 28 }) {
        return (
          <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
            <path
              d="M75 15 C 60 15, 35 25, 25 50 C 18 68, 25 82, 35 85 L 50 60 Z M 75 15 C 80 35, 75 60, 50 60"
              stroke={BRAND.lime} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"
              fill="none"
            />
            <path d="M 50 60 L 40 80" stroke={BRAND.lime} strokeWidth="4" strokeLinecap="round"/>
            <path d="M 55 45 L 45 50" stroke={BRAND.lime} strokeWidth="3" strokeLinecap="round"/>
            <path d="M 60 30 L 50 35" stroke={BRAND.lime} strokeWidth="3" strokeLinecap="round"/>
          </svg>
        );
      }

      // ============================================================================
      //  REUSABLE PICKER SCREEN (used by mode, fuel, size, ptType)
      // ============================================================================
      function ScreenPicker({ eyebrow, title, subtitle, options, onSelect, onBack }) {
        return (
          <div className="animate-fadeIn">
            {onBack && (
              <button
                onClick={onBack}
                className="mb-4 text-sm"
                style={{ color: BRAND.lime }}
              >
                ← Back
              </button>
            )}

            <p style={{
              color: BRAND.lime, fontSize: 11, fontWeight: 700,
              letterSpacing: "0.15em", marginBottom: 6,
            }}>
              {eyebrow.toUpperCase()}
            </p>
            <h1 style={{
              fontSize: 28, fontWeight: 700, lineHeight: 1.15,
              color: BRAND.white, marginBottom: 8, letterSpacing: "-0.02em",
            }}>
              {title}
            </h1>
            <p style={{ color: BRAND.muted, fontSize: 15, marginBottom: 28 }}>
              {subtitle}
            </p>

            <div className="grid grid-cols-2 gap-3">
              {options.map((o, idx) => (
                <PickerCard key={o.id} option={o} index={idx} onClick={() => onSelect(o)} />
              ))}
            </div>
          </div>
        );
      }

      function PickerCard({ option, index, onClick }) {
        const [hover, setHover] = React.useState(false);
        return (
          <button
            onClick={onClick}
            onMouseEnter={() => setHover(true)}
            onMouseLeave={() => setHover(false)}
            className="group relative flex aspect-square flex-col items-start justify-between p-4 text-left"
            style={{
              backgroundColor: BRAND.cream,
              borderRadius: 20,

      // ============================================================================
      //  DISTANCE SCREEN
      // ============================================================================
      function ScreenDistance({ onBack, onSubmit }) {
        const [tab, setTab] = React.useState("postcode");
        const [distance, setDistance] = React.useState("");
        const [unit, setUnit] = React.useState(DEFAULT_UNIT);
        const [postcode, setPostcode] = React.useState("");
        const [loading, setLoading] = React.useState(false);
        const [error, setError] = React.useState(null);

        const canSubmitManual = distance && Number(distance) > 0;
        const canSubmitPostcode = isValidUKPostcode(postcode);

        const submitManual = () => {
          if (!canSubmitManual) return;
          const km = unit === "miles" ? Number(distance) * MILES_TO_KM : Number(distance);
          onSubmit({ km, label: `${distance} ${unit}`, origin: "" });
        };

        const submitPostcode = async () => {
          if (!canSubmitPostcode) return;
          setLoading(true); setError(null);
          try {
            const r = await fetchDrivingDistance(postcode, EVENT_LOCATION);
            onSubmit({
              km: r.meters / 1000,
              label: r.text,
              origin: postcode.toUpperCase().trim(),
            });
          } catch (e) {
            setError(e.message || "Something went wrong. Try again?");
            setLoading(false);
          }
        };

        return (
          <div className="animate-fadeIn">
            <button onClick={onBack} className="mb-4 text-sm" style={{ color: BRAND.lime }}>
              ← Back
            </button>

            <h1 style={{
              fontSize: 28, fontWeight: 700, lineHeight: 1.15,
              color: BRAND.white, marginBottom: 8, letterSpacing: "-0.02em",
            }}>
              Where did you come from?
            </h1>
            <p style={{ color: BRAND.muted, fontSize: 15, marginBottom: 24 }}>
              We'll work out the distance.
            </p>

            <Toggle
              value={tab}
              onChange={(v) => { setTab(v); setError(null); }}
              options={[
                { value: "postcode", label: "Use my postcode" },
                { value: "manual",   label: "I know my distance" },
              ]}
            />

            {tab === "postcode" && (
              <div className="animate-fadeIn mt-6">

                  <label style={{
                    color: BRAND.lime, fontSize: 11, fontWeight: 700,
                    letterSpacing: "0.15em", display: "block", marginBottom: 8,

                    YOUR POSTCODE
                  </label>
                  <div style={{ borderBottom: `2px solid ${BRAND.lime}`, paddingBottom: 10 }}>
                    <input
                      type="text"
                      value={postcode}
                      onChange={(e) => setPostcode(e.target.value.toUpperCase())}
                      onKeyDown={(e) => e.key === "Enter" && submitPostcode()}
                      placeholder="e.g. EX39 5AP"
                      autoComplete="postal-code"
                      autoCapitalize="characters"
                      className="w-full bg-transparent outline-none"
                      style={{
                        fontSize: 36, fontWeight: 600, color: BRAND.white,

                      }}
                      autoFocus
                    />
                  </div>
                  <p style={{ color: BRAND.muted, fontSize: 12, marginTop: 10 }}>

                  </p>

            {tab === "manual" && (
              <div className="animate-fadeIn mt-6">
                <div className="mb-6">
                  <Toggle

      // ============================================================================
      //  COMPARISON PANEL — public transport alternative
      // ============================================================================
      function ComparisonPanel({ mode, distanceKm, perPersonKg }) {
        if (mode === "cycleWalk" || mode === "publicTransport") return null;
        if (!distanceKm || distanceKm <= 0) return null;

        const railKg = distanceKm * COMPARISON_FACTORS.rail;
        const busKg = distanceKm * COMPARISON_FACTORS.bus;
        const bestKg = Math.min(railKg, busKg);
        const saving = perPersonKg - bestKg;
        const savingPct = Math.round((saving / perPersonKg) * 100);
        const cleaner = railKg < busKg ? "train" : "bus";
        const emoji = cleaner === "train" ? "🚆" : "🚌";

        return (
          <Card>
            <p style={{
              fontSize: 11, fontWeight: 700, color: BRAND.cardLabel,
              letterSpacing: "0.15em", marginBottom: 4,
            }}>
              WHAT IF YOU'D
            </p>
            <p style={{
              fontSize: 22, fontWeight: 700, color: BRAND.cardText,
              lineHeight: 1.15, marginBottom: 16,
            }}>
              taken the {cleaner}? {emoji}
            </p>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <MiniStat label="🚆 Train" value={railKg.toFixed(2)} unit="kg" />
              <MiniStat label="🚌 Bus" value={busKg.toFixed(2)} unit="kg" />
            </div>

            {saving > 0 && (
              <div style={{
                marginTop: 14, padding: 14, borderRadius: 14,
                backgroundColor: "#e9f0df", border: "1px solid #c8d4a8",
              }}>
                <p style={{
                  fontSize: 11, fontWeight: 700, color: BRAND.dark,
                  letterSpacing: "0.15em", marginBottom: 4,
                }}>
                  YOU COULD'VE SAVED
                </p>
                <p style={{
                  fontSize: 20, fontWeight: 700, color: BRAND.dark, lineHeight: 1.2,
                }}>
                  {saving.toFixed(2)} kg CO₂e
                  {savingPct > 0 && (
                    <span style={{ fontSize: 14, fontWeight: 500, color: BRAND.cardSubtle, marginLeft: 8 }}>
                      ({savingPct}% less)
                    </span>
                  )}
                </p>
              </div>
            )}
          </Card>
        );
      }

      // ============================================================================
      //  MAP PANEL — real route polyline via Apps Script Directions proxy
      // ============================================================================
      function MapPanel({ originLabel }) {
        const hasOrigin = originLabel && originLabel.trim().length > 0;
        const [polyline, setPolyline] = React.useState(null);
        const [loadingRoute, setLoadingRoute] = React.useState(hasOrigin);

        React.useEffect(() => {
          if (!hasOrigin) return;
          let cancelled = false;
          (async () => {
            try {
              const url = PROXY_URL +
                "?action=directions" +
                "&origin=" + encodeURIComponent(originLabel + ", UK") +
                "&destination=" + encodeURIComponent(EVENT_LOCATION);
              const res = await fetch(url);
              const data = await res.json();
              if (!cancelled && data.status === "OK" && data.polyline) {
                setPolyline(data.polyline);
              }
            } catch {}
            finally { if (!cancelled) setLoadingRoute(false); }
          })();
          return () => { cancelled = true; };
        }, [originLabel, hasOrigin]);

        const mapStyle = [
          "feature:all|element:labels.text.fill|color:0x5a6650",
          "feature:all|element:labels.text.stroke|color:0xf5f1e8|weight:2",
          "feature:landscape|color:0xefe8d3",
          "feature:water|color:0xc8d4cc",
          "feature:road|element:geometry|color:0xffffff",
          "feature:road|element:labels|visibility:simplified",
          "feature:poi|visibility:off",
          "feature:transit|visibility:off",
          "feature:administrative|element:geometry.stroke|color:0xd6cfb8",
        ];
        const styleParams = mapStyle.map((s) => "&style=" + encodeURIComponent(s)).join("");

        const destMarker = "color:0x00544F|" + encodeURIComponent(EVENT_LOCATION);

        let src;
        if (hasOrigin) {
          const origin = originLabel + ", UK";
          const originMarker = "color:0x85BE00|" + encodeURIComponent(origin);
          const path = polyline
            ? "color:0x00544Fff|weight:4|enc:" + polyline
            : "color:0x00544Fff|weight:4|geodesic:true|" +
              encodeURIComponent(origin) + "|" +
              encodeURIComponent(EVENT_LOCATION);
          src =
            "https://maps.googleapis.com/maps/api/staticmap" +
            "?size=600x300&scale=2" +
            "&markers=" + originMarker +
            "&markers=" + destMarker +
            "&path=" + path +
            styleParams + "&key=" + MAPS_KEY;
        } else {
          src =
            "https://maps.googleapis.com/maps/api/staticmap" +
            "?size=600x300&scale=2&zoom=12" +
            "&markers=" + destMarker +
            styleParams + "&key=" + MAPS_KEY;
        }

        return (
          <div style={{
            marginBottom: 16, borderRadius: 20, overflow: "hidden",
            backgroundColor: BRAND.cream, position: "relative",
            boxShadow: "0 4px 12px -4px rgba(0,0,0,0.15)",
          }}>
            <img
              src={src}
              alt={hasOrigin ? "Route map" : "Event location map"}
              style={{ display: "block", width: "100%", height: "auto" }}
              loading="lazy"
            />
            {loadingRoute && (
              <div style={{
                position: "absolute", top: 12, right: 12,
                backgroundColor: "rgba(255,255,255,0.95)", borderRadius: 9999,
                padding: "5px 12px", fontSize: 11, color: BRAND.cardSubtle,
                display: "flex", alignItems: "center", gap: 6,
              }}>
                <span className="spinner inline-block" style={{
                  width: 10, height: 10,
                  border: `1.5px solid rgba(0,84,79,0.3)`,
                  borderTopColor: BRAND.dark, borderRadius: "50%",
                }}/>
                Loading route
              </div>
            )}
          </div>
        );
      }

      // ============================================================================
      //  SHARED UI HELPERS
      // ============================================================================
      function Card({ children }) {
        return (
          <div style={{
            backgroundColor: BRAND.cream, color: BRAND.cardText,
            borderRadius: 20, padding: 20, marginBottom: 16,
            boxShadow: "0 4px 12px -4px rgba(0,0,0,0.15)",
          }}>
            {children}
          </div>
        );
      }

      function Stat({ label, value, unit, highlight, align = "left" }) {
        return (
          <div style={{ textAlign: align }}>
            <p style={{
              fontSize: 11, fontWeight: 700, color: BRAND.cardLabel,
              letterSpacing: "0.15em",
            }}>
              {label.toUpperCase()}
            </p>
            <p style={{
              fontSize: 28, fontWeight: 700, lineHeight: 1,
              color: highlight ? BRAND.dark : BRAND.cardText, marginTop: 4,
              letterSpacing: "-0.02em",
            }}>
              {value} <span style={{ fontSize: 14, color: BRAND.cardSubtle, fontWeight: 500 }}>{unit}</span>
            </p>
          </div>
        );
      }

      function MiniStat({ label, value, unit }) {
        return (
          <div style={{
            backgroundColor: "#f5f1e8", borderRadius: 14, padding: 12,
          }}>
            <p style={{
              fontSize: 10, fontWeight: 700, color: BRAND.cardLabel,
              letterSpacing: "0.1em", marginBottom: 4,
            }}>
              {label.toUpperCase()}
            </p>
            <p style={{
              fontSize: 20, fontWeight: 700, color: BRAND.dark, lineHeight: 1,
            }}>
              {value} <span style={{ fontSize: 12, color: BRAND.cardSubtle, fontWeight: 500 }}>{unit}</span>
            </p>
          </div>
        );
      }

      function Toggle({ value, onChange, options, small }) {
        return (
          <div style={{
            display: "inline-flex", padding: 4, borderRadius: 9999,
            backgroundColor: "rgba(255,255,255,0.1)",
          }}>
            {options.map((o) => (
              <button
                key={o.value}
                onClick={() => onChange(o.value)}
                style={{
                  padding: small ? "6px 16px" : "8px 18px",
                  borderRadius: 9999, fontSize: small ? 13 : 14, fontWeight: 600,
                  backgroundColor: value === o.value ? BRAND.lime : "transparent",
                  color: value === o.value ? BRAND.white : BRAND.muted,
                  border: "none", cursor: "pointer",
                  transition: "all 0.2s ease",
                }}
              >
                {o.label}
              </button>
            ))}
          </div>
        );
      }

      function PrimaryButton({ children, onClick, disabled, loading, loadingLabel }) {
        return (
          <button
            onClick={onClick}
            disabled={disabled || loading}
            style={{
              width: "100%", padding: "16px 24px", borderRadius: 9999,
              fontSize: 16, fontWeight: 700,
              backgroundColor: (disabled && !loading) ? "rgba(255,255,255,0.15)" : BRAND.lime,
              color: (disabled && !loading) ? BRAND.muted : BRAND.white,
              cursor: (disabled || loading) ? "not-allowed" : "pointer",
              border: "none",
              boxShadow: (disabled || loading) ? "none" : "0 10px 25px -8px rgba(133,190,0,0.5)",
              transition: "all 0.2s ease",
              letterSpacing: "-0.01em",
            }}
            onMouseEnter={(e) => {
              if (!disabled && !loading) e.currentTarget.style.backgroundColor = BRAND.limeDark;
            }}
            onMouseLeave={(e) => {
              if (!disabled && !loading) e.currentTarget.style.backgroundColor = BRAND.lime;
            }}
          >
            {loading ? (
              <span style={{ display: "inline-flex", alignItems: "center", gap: 8, justifyContent: "center" }}>
                <span className="spinner inline-block" style={{
                  width: 16, height: 16,
                  border: "2px solid rgba(255,255,255,0.4)",
                  borderTopColor: BRAND.white, borderRadius: "50%",
                }}/>
                {loadingLabel || "Loading…"}
              </span>
            ) : children}
          </button>
        );
      }

      function ErrorBanner({ message }) {
        return (
          <div style={{
            marginBottom: 16, padding: 12, borderRadius: 14,
            backgroundColor: "#fbe8e0", color: "#7a3520",
            border: "1px solid #f0c8b8", fontSize: 13,
          }}>
            ⚠️ {message}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<CarbonCalculator />);
    </script>
  </body>
</html>
